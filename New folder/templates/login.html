<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CodeGenAI Login</title>

<style>

/* animated gradient background */
body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#6b5cff,#9f8cff,#c9b6ff,#efe9ff);
background-size:400% 400%;
animation:gradientMove 12s ease infinite;
overflow:hidden;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* particles */
.particles span{
position:absolute;
bottom:-40px;
width:18px;
height:18px;
border-radius:50%;
opacity:1;
animation:rise linear infinite;
box-shadow:0 0 25px currentColor;
}

/* bright colors */
.particles span:nth-child(1){
left:10%;
color:#00ffff;
background:#00ffff;
animation-duration:10s;
}
.particles span:nth-child(2){
left:30%;
color:#ff3df5;
background:#ff3df5;
animation-duration:14s;
}
.particles span:nth-child(3){
left:50%;
color:#ffe600;
background:#ffe600;
animation-duration:12s;
}
.particles span:nth-child(4){
left:70%;
color:#7cff6b;
background:#7cff6b;
animation-duration:16s;
}
.particles span:nth-child(5){
left:85%;
color:#4da3ff;
background:#4da3ff;
animation-duration:11s;
}

/* rising animation */
@keyframes rise{
0%{transform:translateY(0) scale(0.6)}
100%{transform:translateY(-120vh) scale(1.3)}
}

/* glass card */
.card{
position:relative;
background:rgba(255,255,255,0.9);
backdrop-filter:blur(12px);
padding:40px;
border-radius:16px;
width:340px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
z-index:2;
}

h2{
color:#6b5cff;
margin-bottom:5px;
}

input{
width:100%;
padding:12px;
margin:12px 0;
border-radius:8px;
border:1px solid #ddd;
}

button{
background:#6b5cff;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.small{
font-size:12px;
color:#777;
}

</style>
</head>

<body>

<!-- particles -->
<div class="particles">
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
</div>

<div class="card">
<h2>🤖 CodeGenAI</h2>
<p class="small">Smart AI Coding Assistant</p>

<form method="POST">
<input name="username" placeholder="Enter username">
<input type="password" placeholder="Password">
<button>Login</button>
</form>
</div>

</body>
</html>
