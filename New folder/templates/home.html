<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CodeGenAI</title>

<style>
body{margin:0;font-family:Arial;background:linear-gradient(135deg,#efe9ff,#f7f5ff);}
.header{background:#6b5cff;color:white;padding:18px;font-size:22px;display:flex;justify-content:space-between;}
.container{max-width:950px;margin:auto;padding:25px;}
.profile{display:flex;align-items:center;background:white;padding:15px;border-radius:14px;box-shadow:0 8px 20px rgba(0,0,0,0.08);margin-bottom:20px;}
.avatar{width:55px;height:55px;border-radius:50%;background:#6b5cff;color:white;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:bold;margin-right:15px;}
.card{background:white;padding:20px;border-radius:14px;box-shadow:0 8px 20px rgba(0,0,0,0.08);margin-bottom:20px;}
textarea{width:100%;height:110px;border-radius:10px;border:1px solid #ddd;padding:12px;font-family:monospace;background:#fafaff;}
button{background:#6b5cff;color:white;border:none;padding:12px 18px;border-radius:8px;cursor:pointer;margin-top:12px;}
pre{background:#0f172a;color:#e2e8f0;padding:18px;border-radius:10px;overflow:auto;}
.tag{background:#efe9ff;padding:4px 10px;border-radius:6px;font-size:12px;margin-left:8px;}
</style>
</head>

<body>

<div class="header">
🤖 CodeGenAI
<div>AI Coding Workspace</div>
</div>

<div class="container">

<div class="profile">
<div class="avatar">{{initial}}</div>
<div>
<b>{{username}}</b>
<div style="color:#777">{{language}} Developer <span class="tag">CodeGenAI</span></div>
</div>
</div>

<div class="card">
<h3>✨ Code Input</h3>

<form action="/generate" method="POST">
<input type="hidden" name="username" value="{{username}}">

<label><b>Select Language</b></label><br>
<select name="language" style="padding:8px;border-radius:6px;margin-bottom:10px;">
<option>Python</option>
<option>C</option>
<option>C++</option>
</select>

<textarea name="input_text" placeholder="Create factorial function"></textarea>
<br>
<button>🚀 Generate Code</button>
</form>

</div>

<div class="card">
<h3>🧠 Generated Output</h3>
<pre>{{output}}</pre>
</div>

</div>

</body>
</html>
